function ProblemRow({ idx, problem, solved, revision, onToggleSolved, onToggleRevision }) {
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 9,
        padding: "7px 12px",
        borderBottom: "1px solid #1e2533",
        transition: "background 0.15s",
        cursor: problem.lc ? "pointer" : "default",
        background: solved ? "#0d1f1d" : "transparent",
      }}
      onClick={() =>
        problem.lc &&
        window.open(`https://leetcode.com/problems/${slugify(problem.name)}/`, "_blank")
      }
      onMouseEnter={e => (e.currentTarget.style.background = solved ? "#102b28" : "#161d2e")}
      onMouseLeave={e => (e.currentTarget.style.background = solved ? "#0d1f1d" : "transparent")}
    >
      <label
        title={solved ? "Mark unsolved" : "Mark solved"}
        onClick={e => e.stopPropagation()}
        style={{
          width: 22,
          minWidth: 22,
          height: 22,
          display: "inline-flex",
          alignItems: "center",
          justifyContent: "center",
          cursor: "pointer",
        }}
      >
        <input
          type="checkbox"
          checked={solved}
          onChange={() => onToggleSolved(problem)}
          style={{
            width: 15,
            height: 15,
            accentColor: "#00b8a3",
            cursor: "pointer",
          }}
        />
      </label>
      <button
        type="button"
        title={revision ? "Remove from revision" : "Add to revision"}
        onClick={e => {
          e.stopPropagation();
          onToggleRevision(problem);
        }}
        style={{
          width: 26,
          height: 26,
          borderRadius: 5,
          border: `1px solid ${revision ? "#f59e0b" : "#2d3f5c"}`,
          background: revision ? "#f59e0b22" : "transparent",
          color: revision ? "#fbbf24" : "#64748b",
          fontSize: 15,
          lineHeight: 1,
          cursor: "pointer",
          fontFamily: "inherit",
          flexShrink: 0,
        }}
        aria-pressed={revision}
      >
        {revision ? "★" : "☆"}
      </button>
      <span style={{ color: "#4a5568", fontSize: 12, minWidth: 30, textAlign: "right", flexShrink: 0 }}>
        {idx + 1}.
      </span>
      <span
        style={{
          flex: 1,
          color: solved ? "#7dd3c7" : "#e2e8f0",
          fontSize: 13.5,
          lineHeight: 1.4,
          textDecoration: solved ? "line-through" : "none",
          minWidth: 0,
        }}
      >
        {problem.name}
      </span>
      {problem.lc && (
        <span style={{ color: "#3b82f6", fontSize: 12, minWidth: 38, textAlign: "right", flexShrink: 0 }}>
          #{problem.lc}
        </span>
      )}
      <DiffBadge diff={problem.diff} />
    </div>
  );
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

function problemKey(problem) {
  return problem.lc ? `lc-${problem.lc}` : `name-${slugify(problem.name)}`;
}

function getUniqueProblems() {
  const seen = new Set();
  const problems = [];
  ALL_TOPICS.forEach(topic => {
    topic.problems.forEach(problem => {
      const key = problemKey(problem);
      if (!seen.has(key)) {
        seen.add(key);
        problems.push(problem);
      }
    });
  });
  return problems;
}

function loadProgress() {
  try {
    const stored = window.localStorage.getItem(STORAGE_KEY);
    if (!stored) return { solved: {}, revision: {} };
    const parsed = JSON.parse(stored);
    return {
      solved: parsed && parsed.solved ? parsed.solved : {},
      revision: parsed && parsed.revision ? parsed.revision : {},
    };
  } catch (error) {
    return { solved: {}, revision: {} };
  }
}

  const [search, setSearch] = useState("");

  const [activeTopList, setActiveTopList] = useState("top50");
  const [expandedTopics, setExpandedTopics] = useState(new Set([1]));
  const [progress, setProgress] = useState(loadProgress);

  useEffect(() => {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    } catch (error) {
      // Keep the app usable even if browser storage is unavailable.
    }
  }, [progress]);

  const uniqueProblemList = useMemo(() => getUniqueProblems(), []);

  const isSolved = problem => Boolean(progress.solved[problemKey(problem)]);
  const isRevision = problem => Boolean(progress.revision[problemKey(problem)]);

  const toggleProgress = (bucket, problem) => {
    const key = problemKey(problem);
    setProgress(prev => {
      const nextBucket = { ...prev[bucket] };
      if (nextBucket[key]) delete nextBucket[key];
      else nextBucket[key] = true;
      return { ...prev, [bucket]: nextBucket };
    });
  };

  const renderProblemRow = (problem, i) => (
    <ProblemRow
      key={`${problemKey(problem)}-${i}`}
      idx={i}
      problem={problem}
      solved={isSolved(problem)}
      revision={isRevision(problem)}
      onToggleSolved={p => toggleProgress("solved", p)}
      onToggleRevision={p => toggleProgress("revision", p)}
    />
  );

  const toggleTopic = id => {
    setExpandedTopics(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const expandAll = () => setExpandedTopics(new Set(ALL_TOPICS.map(t => t.id)));
  const collapseAll = () => setExpandedTopics(new Set());

  const filteredTopics = useMemo(() => {
    const q = search.toLowerCase().trim();
    return ALL_TOPICS.map(topic => ({
      ...topic,
      problems: topic.problems.filter(p => {
        const matchQ = !q || p.name.toLowerCase().includes(q) || (p.lc && String(p.lc).includes(q));
        const matchD = diffFilter === "All" || p.diff === diffFilter;
        return matchQ && matchD;
      }),
    })).filter(t => t.problems.length > 0);
  }, [search, diffFilter]);

  const filteredTopList = useMemo(() => {
    const q = search.toLowerCase().trim();
    return (TOP_LISTS[activeTopList] || []).filter(p => {
      const matchQ = !q || p.name.toLowerCase().includes(q) || (p.lc && String(p.lc).includes(q));
      const matchD = diffFilter === "All" || p.diff === diffFilter;
      return matchQ && matchD;
    });
  }, [search, diffFilter, activeTopList]);

  const filteredRevisionList = useMemo(() => {
    const q = search.toLowerCase().trim();
    return uniqueProblemList.filter(p => {
      const matchRevision = progress.revision[problemKey(p)];
      const matchQ = !q || p.name.toLowerCase().includes(q) || (p.lc && String(p.lc).includes(q));
      const matchD = diffFilter === "All" || p.diff === diffFilter;
      return matchRevision && matchQ && matchD;
    });
  }, [search, diffFilter, progress.revision, uniqueProblemList]);

  const uniqueProblems = uniqueProblemList.length;
  const solvedCount = uniqueProblemList.filter(isSolved).length;
  const revisionCount = uniqueProblemList.filter(isRevision).length;

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#0a0e1a",
        fontFamily: "'JetBrains Mono', 'Fira Mono', 'Courier New', monospace",
        color: "#e2e8f0",
      }}
    >
      {/* Header */}
      <div
        style={{
          background: "linear-gradient(135deg, #0f1729 0%, #0d1425 100%)",
          borderBottom: "1px solid #1e2d47",
          padding: "20px 24px 16px",
          position: "sticky",
          top: 0,
          zIndex: 100,
        }}
      >
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: "#60a5fa", letterSpacing: -0.5 }}>
              {"{ DSA }"}
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#f1f5f9", letterSpacing: -0.3 }}>
                Interview Problem Bank
              </div>
              <div style={{ fontSize: 11, color: "#64748b" }}>
                SDE-1 · 8–20 LPA · {solvedCount}/{uniqueProblems} solved · {revisionCount} for revision
              </div>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 10 }}>
              {["Easy", "Medium", "Hard"].map(d => (
                <div key={d} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: DIFFICULTY_COLOR[d] }} />
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>{d}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Search + Filters */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search problems by name or LeetCode #..."
              style={{
                flex: 1,
                minWidth: 200,
                padding: "8px 14px",
                borderRadius: 6,
                border: "1px solid #2d3f5c",
                background: "#0a1020",
                color: "#e2e8f0",
                fontSize: 13,
                outline: "none",
              }}
            />
            {["All", "Easy", "Medium", "Hard"].map(d => (
              <button
                key={d}
                onClick={() => setDiffFilter(d)}
                style={{
                  padding: "7px 14px",
                  borderRadius: 6,
                  border: `1px solid ${diffFilter === d ? (DIFFICULTY_COLOR[d] || "#3b82f6") : "#2d3f5c"}`,
                  background: diffFilter === d ? `${DIFFICULTY_COLOR[d] || "#3b82f6"}22` : "transparent",
                  color: diffFilter === d ? (DIFFICULTY_COLOR[d] || "#60a5fa") : "#64748b",
                  fontSize: 12,
                  fontWeight: 600,
                  cursor: "pointer",
                  fontFamily: "inherit",
                }}
              >
                {d}
              </button>
            ))}
          </div>

          {/* View Toggle */}
          <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
            <button
              onClick={() => setActiveView("topics")}
              style={{
                padding: "5px 14px",
                borderRadius: 5,
                border: "none",
                background: activeView === "topics" ? "#1e40af" : "transparent",
                color: activeView === "topics" ? "#fff" : "#64748b",
                fontSize: 12,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
              }}
            >
              By Topic
            </button>
            <button
              onClick={() => setActiveView("toplists")}
              style={{
                padding: "5px 14px",
                borderRadius: 5,
                border: "none",
                background: activeView === "toplists" ? "#1e40af" : "transparent",
                color: activeView === "toplists" ? "#fff" : "#64748b",
                fontSize: 12,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
              }}
            >
              Curated Lists
            </button>
            <button
              onClick={() => setActiveView("revision")}
              style={{
                padding: "5px 14px",
                borderRadius: 5,
                border: "none",
                background: activeView === "revision" ? "#92400e" : "transparent",
                color: activeView === "revision" ? "#fff" : "#64748b",
                fontSize: 12,
                fontWeight: 700,
                cursor: "pointer",
                fontFamily: "inherit",
              }}
            >
              Revision ({revisionCount})
            </button>
            {activeView === "topics" && !search && (
              <>
                <button
                  onClick={expandAll}
                  style={{
                    marginLeft: "auto",
                    padding: "5px 12px",
                    borderRadius: 5,
                    border: "1px solid #2d3f5c",
                    background: "transparent",
                    color: "#64748b",
                    fontSize: 11,
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                >
                  Expand All
                </button>
                <button
                  onClick={collapseAll}
                  style={{
                    padding: "5px 12px",
                    borderRadius: 5,
                    border: "1px solid #2d3f5c",
                    background: "transparent",
                    color: "#64748b",
                    fontSize: 11,
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                >
                  Collapse All
                </button>
              </>
            )}
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px 60px" }}>
        {activeView === "topics" && (
          <>
            {filteredTopics.length === 0 && (
              <div style={{ textAlign: "center", padding: 60, color: "#4a5568", fontSize: 14 }}>
                No problems match your search.
              </div>
            )}
            {filteredTopics.map(topic => {
              const expanded = expandedTopics.has(topic.id) || search.trim() !== "";
              const easy = topic.problems.filter(p => p.diff === "Easy").length;
              const med = topic.problems.filter(p => p.diff === "Medium").length;
              const hard = topic.problems.filter(p => p.diff === "Hard").length;
              return (
                <div
                  key={topic.id}
                  style={{
                    marginBottom: 10,
                    border: "1px solid #1e2d47",
                    borderRadius: 8,
                    overflow: "hidden",
                    background: "#0d1425",
                  }}
                >
                  <div
                    onClick={() => toggleTopic(topic.id)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      padding: "12px 16px",
                      cursor: "pointer",
                      userSelect: "none",
                      gap: 12,
                      background: expanded ? "#111827" : "#0d1425",
                      transition: "background 0.15s",
                    }}
                  >
                    <span style={{ color: "#3b82f6", fontSize: 12, minWidth: 24, fontWeight: 700 }}>
                      {topic.id < 10 ? `0${topic.id}` : topic.id}
                    </span>
                    <span style={{ flex: 1, fontWeight: 700, fontSize: 14, color: "#f1f5f9" }}>
                      {topic.name}
                    </span>
                    <div style={{ display: "flex", gap: 6 }}>
                      {easy > 0 && <span style={{ color: DIFFICULTY_COLOR.Easy, fontSize: 11 }}>E:{easy}</span>}
                      {med > 0 && <span style={{ color: DIFFICULTY_COLOR.Medium, fontSize: 11 }}>M:{med}</span>}
                      {hard > 0 && <span style={{ color: DIFFICULTY_COLOR.Hard, fontSize: 11 }}>H:{hard}</span>}
                    </div>
                    <span style={{ color: "#4a5568", fontSize: 12, minWidth: 28, textAlign: "right" }}>
                      {topic.problems.length}
                    </span>
                    <span style={{ color: "#4a5568", fontSize: 14 }}>{expanded ? "▲" : "▼"}</span>
                  </div>
                  {expanded && (
                    <div>
                      {topic.problems.map(renderProblemRow)}
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {activeView === "toplists" && (
          <>
            <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
              {TOP_LIST_META.map(m => (
                <button
                  key={m.key}
                  onClick={() => setActiveTopList(m.key)}
                  style={{
                    padding: "8px 16px",
                    borderRadius: 6,
                    border: `1px solid ${activeTopList === m.key ? "#3b82f6" : "#2d3f5c"}`,
                    background: activeTopList === m.key ? "#1e3a8a33" : "transparent",
                    color: activeTopList === m.key ? "#60a5fa" : "#64748b",
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                >
                  {m.label}
                </button>
              ))}
            </div>

            <div
              style={{
                background: "#0d1425",
                border: "1px solid #1e2d47",
                borderRadius: 8,
                overflow: "hidden",
              }}
            >
              <div
                style={{
                  padding: "12px 16px",
                  background: "#111827",
                  borderBottom: "1px solid #1e2d47",
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <span style={{ fontWeight: 700, fontSize: 14, color: "#60a5fa" }}>
                  {TOP_LIST_META.find(m => m.key === activeTopList)?.label}
                </span>
                <span style={{ fontSize: 12, color: "#4a5568" }}>
                  {filteredTopList.length} problems
                </span>
              </div>
              {filteredTopList.length === 0 && (
                <div style={{ padding: 40, textAlign: "center", color: "#4a5568", fontSize: 14 }}>
                  No problems match your filters.
                </div>
              )}
              {filteredTopList.map(renderProblemRow)}
            </div>
          </>
        )}

        {activeView === "revision" && (
          <div
            style={{
              background: "#0d1425",
              border: "1px solid #1e2d47",
              borderRadius: 8,
              overflow: "hidden",
            }}
          >
            <div
              style={{
                padding: "12px 16px",
                background: "#111827",
                borderBottom: "1px solid #1e2d47",
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
              }}
            >
              <span style={{ fontWeight: 700, fontSize: 14, color: "#fbbf24" }}>
                Revision Questions
              </span>
              <span style={{ fontSize: 12, color: "#4a5568" }}>
                {filteredRevisionList.length} selected
              </span>
            </div>
            {filteredRevisionList.length === 0 && (
              <div style={{ padding: 40, textAlign: "center", color: "#4a5568", fontSize: 14 }}>
                No revision problems match your filters.
              </div>
            )}
            {filteredRevisionList.map(renderProblemRow)}
          </div>
        )}
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
